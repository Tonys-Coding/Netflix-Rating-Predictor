<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Title Rating Predictor</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="bg-container">
      <div class="pattern-bg">
        <svg
          preserveAspectRatio="xMidYMid slice"
          height="100%"
          width="100%"
          class="cube-svg"
          viewBox="0 0 120 104"
        >
          <defs>
            <linearGradient y2="100%" x2="100%" y1="0%" x1="0%" id="cube-dark">
              <stop stop-color="#232526" offset="0%"></stop>
              <stop stop-color="#414345" offset="100%"></stop>
            </linearGradient>
            <linearGradient y2="0%" x2="100%" y1="100%" x1="0%" id="cube-mid">
              <stop stop-color="#4b6cb7" offset="0%"></stop>
              <stop stop-color="#182848" offset="100%"></stop>
            </linearGradient>
            <linearGradient y2="100%" x2="0%" y1="0%" x1="100%" id="cube-light">
              <stop stop-color="#a8edea" offset="0%"></stop>
              <stop stop-color="#fed6e3" offset="100%"></stop>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>

    <div class="container">
      <header>
        <h1>Netflix Movie/Show Rating Predictor</h1>
        <p>Machine Learning Model for IMDb Score Estimation</p>
      </header>

      <div id="step-1" class="step-section active">
        <fieldset>
          <legend>Part 1: Core Parameters</legend>

          <div class="form-group">
            <label for="title">Title <span style="color: red">*</span></label>
            <input
              id="title"
              type="text"
              placeholder="Enter movie or show title"
              required
            />
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>Format <span style="color: red">*</span></label>
              <div class="radio-group">
                <label
                  ><input
                    type="radio"
                    name="formatType"
                    value="Movie"
                    checked
                    onchange="updateFormatLabel()"
                  />
                  Movie</label
                >
                <label
                  ><input
                    type="radio"
                    name="formatType"
                    value="TV Show"
                    onchange="updateFormatLabel()"
                  />
                  TV Show</label
                >
              </div>
            </div>

            <div class="form-group">
              <label for="releaseYear"
                >Release Year <span style="color: red">*</span></label
              >
              <input
                id="releaseYear"
                type="number"
                placeholder="YYYY"
                min="1900"
                max="2030"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="actualRating"
              >Actual IMDb Rating
              <span class="help-text"
                >(Optional: used for accuracy comparison)</span
              ></label
            >
            <input
              id="actualRating"
              type="number"
              step="0.1"
              min="1"
              max="10"
              placeholder="e.g. 8.5"
            />
          </div>

          <div class="form-group">
            <label
              >Genres <span style="color: red">*</span>
              <span class="help-text">(Select up to 4)</span></label
            >
            <div class="checkbox-grid" id="genre-grid"></div>
          </div>
        </fieldset>

        <div class="button-group" style="justify-content: flex-end">
          <button class="btn-primary" onclick="validateAndGoStep(2)">
            Proceed to Details &rarr;
          </button>
        </div>
      </div>

      <div id="step-2" class="step-section">
        <fieldset>
          <legend>Part 2: Metadata & Features</legend>

          <div class="grid-2">
            <div class="form-group">
              <label for="language">Primary Language</label>
              <select id="language">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="ko">Korean</option>
                <option value="ja">Japanese</option>
                <option value="de">German</option>
                <option value="hi">Hindi</option>
                <option value="pt">Portuguese</option>
                <option value="it">Italian</option>
                <option value="zh">Mandarin</option>
                <option value="tr">Turkish</option>
                <option value="ru">Russian</option>
              </select>
            </div>

            <div class="form-group">
              <label for="country">Country of Origin</label>
              <select id="country">
                <option>United States of America</option>
                <option>United Kingdom</option>
                <option>India</option>
                <option>South Korea</option>
                <option>Japan</option>
                <option>France</option>
                <option>Germany</option>
                <option>Spain</option>
                <option>Canada</option>
                <option>Mexico</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="cast"
              >Main Cast <span class="help-text">(Comma separated)</span></label
            >
            <input
              id="cast"
              type="text"
              placeholder="e.g. Jane Doe, John Smith"
            />
          </div>

          <div class="form-group">
            <label for="director">Director / Creator</label>
            <input
              id="director"
              type="text"
              placeholder="Name of director or showrunner"
            />
          </div>

          <div class="form-group">
            <label for="description">Movie/Show Description</label>
            <textarea
              id="description"
              placeholder="Brief summary of the plot..."
            ></textarea>
          </div>

          <div class="grid-3">
            <div class="form-group">
              <label id="duration-label" for="duration">Runtime (mins)</label>
              <input id="duration" type="number" placeholder="e.g. 120" />
            </div>
            <div class="form-group">
              <label for="popularity">Popularity Index</label>
              <input id="popularity" type="number" placeholder="e.g. 84.2" />
            </div>
            <div class="form-group">
              <label for="voteCount">Vote Count</label>
              <input id="voteCount" type="number" placeholder="e.g. 150000" />
            </div>
          </div>
        </fieldset>

        <div id="status-warning" class="status-msg status-warning">
          Initializing connection to API. This may take up to 30 seconds...
        </div>
        <div id="status-error" class="status-msg status-error"></div>

        <div class="button-group">
          <button class="btn-secondary" onclick="goStep(1)">&larr; Back</button>
          <button id="predict-btn" class="btn-primary" onclick="predict()">
            Run Prediction
          </button>
        </div>
      </div>

      <div id="step-3" class="step-section">
        <div class="results-card">
          <h2 class="results-title" id="res-title"></h2>
          <div class="results-meta" id="res-meta"></div>

          <div class="score-comparison" id="ratings-row"></div>

          <div class="analysis-text" id="insight-box"></div>
        </div>

        <div class="button-group">
          <button class="btn-secondary" onclick="resetForm()">
            New Prediction
          </button>
          <button class="btn-primary" onclick="goStep(2)">
            Edit Parameters
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
